<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Affiliate Realm — Town Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;800&family=JetBrains+Mono:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* palette — high-fantasy casual game */
        --grass-1: #7ec850;
        --grass-2: #5aa838;
        --grass-edge: #3f7e27;
        --dirt-1: #8a5a2b;
        --dirt-2: #5f3d1c;
        --stone-1: #d7dde3;
        --stone-2: #9aa4ad;
        --stone-dark: #6c757d;
        --wood-1: #b9762f;
        --wood-2: #7c4a1c;
        --roof-red: #c0392b;
        --roof-red-d: #8e271c;
        --gold-1: #ffd54a;
        --gold-2: #e6a812;
        --holo: #66e6ff;
        --bg-0: #0a0e16;
        --bg-1: #121a28;
        --ink: #f4ecd8;
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; margin: 0; }

      body {
        background:
          radial-gradient(1200px 700px at 50% 18%, #1c2740 0%, var(--bg-1) 45%, var(--bg-0) 100%);
        color: var(--ink);
        font-family: 'Nunito', system-ui, sans-serif;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      /* ambient stars */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(1.5px 1.5px at 20% 30%, #ffffff88, transparent),
          radial-gradient(1.5px 1.5px at 80% 20%, #ffffff66, transparent),
          radial-gradient(1px 1px at 65% 65%, #ffffff55, transparent),
          radial-gradient(1.5px 1.5px at 35% 80%, #ffffff44, transparent),
          radial-gradient(1px 1px at 12% 70%, #ffffff55, transparent);
        opacity: 0.5;
        pointer-events: none;
      }

      .widget {
        width: min(92vw, 760px);
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        perspective: 1500px;
        perspective-origin: 50% 42%;
      }

      .title {
        position: absolute;
        top: 26px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 5;
      }
      .title h1 {
        font-family: 'Fredoka', sans-serif;
        font-weight: 700;
        font-size: clamp(20px, 3.4vw, 30px);
        margin: 0;
        letter-spacing: 0.5px;
        color: var(--ink);
        text-shadow: 0 2px 0 #00000066, 0 0 18px #66e6ff44;
      }
      .title p {
        margin: 4px 0 0;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #9fb4d8;
      }

      /* ---- isometric stage ---- */
      .stage {
        transform-style: preserve-3d;
        transform: rotateX(60deg) rotateZ(-45deg);
        animation: floaty 7s ease-in-out infinite;
      }
      @keyframes floaty {
        0%, 100% { transform: rotateX(60deg) rotateZ(-45deg) translateZ(0); }
        50% { transform: rotateX(60deg) rotateZ(-45deg) translateZ(14px); }
      }

      /* ---- the island terrain plate (a big cuboid) ---- */
      .island {
        --w: 420px;
        --d: 420px;
        --h: 54px;
        position: relative;
        width: var(--w);
        height: var(--d);
        transform-style: preserve-3d;
      }
      .island .face { position: absolute; }
      .island .top {
        width: var(--w);
        height: var(--d);
        transform: translateZ(var(--h));
        background:
          repeating-linear-gradient(0deg, #ffffff10 0 2px, transparent 2px 46px),
          repeating-linear-gradient(90deg, #ffffff10 0 2px, transparent 2px 46px),
          radial-gradient(140% 120% at 30% 25%, var(--grass-1), var(--grass-2) 60%, var(--grass-edge));
        border: 3px solid #ffffff22;
        border-radius: 14px;
        box-shadow: inset 0 0 60px #2c5d18aa;
      }
      .island .north,
      .island .south { width: var(--w); height: var(--h); }
      .island .east,
      .island .west { width: var(--d); height: var(--h); }
      .island .north {
        transform-origin: top; transform: rotateX(-90deg);
        background: linear-gradient(var(--dirt-1), var(--dirt-2));
      }
      .island .south {
        transform-origin: top; transform: translateY(var(--d)) rotateX(-90deg);
        background: linear-gradient(var(--dirt-1), var(--dirt-2));
      }
      .island .west {
        transform-origin: top left;
        transform: rotateZ(90deg) rotateX(-90deg);
        background: linear-gradient(#76491f, #4a2e13);
      }
      .island .east {
        transform-origin: top left;
        transform: translateX(var(--w)) rotateZ(90deg) rotateX(-90deg);
        background: linear-gradient(#76491f, #4a2e13);
      }

      /* ---- generic cuboid building ---- */
      .b {
        position: absolute;
        transform-style: preserve-3d;
        /* placed on the island top (z = island height) */
        transform: translateZ(54px);
        transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        cursor: pointer;
      }
      .b:hover { transform: translateZ(64px); }
      .b .face { position: absolute; border: 2px solid #00000022; }
      .b .top { transform: translateZ(var(--h)); }
      .b .north { transform-origin: top; transform: rotateX(-90deg); filter: brightness(0.82); }
      .b .south { transform-origin: top; transform: translateY(var(--d)) rotateX(-90deg); filter: brightness(0.7); }
      .b .west { transform-origin: top left; transform: rotateZ(90deg) rotateX(-90deg); filter: brightness(0.62); }
      .b .east { transform-origin: top left; transform: translateX(var(--w)) rotateZ(90deg) rotateX(-90deg); filter: brightness(0.75); }

      .b .top { width: var(--w); height: var(--d); border-radius: 4px; }
      .b .north, .b .south { width: var(--w); height: var(--h); }
      .b .east, .b .west { width: var(--d); height: var(--h); }

      /* sizes/positions per building (left/top are island-local coords) */
      .townhall { --w: 96px; --d: 96px; --h: 96px; left: 162px; top: 150px; }
      .townhall .face { background: var(--stone-1); }
      .townhall .top {
        background: linear-gradient(135deg, var(--stone-1), var(--stone-2));
        box-shadow: inset 0 0 12px #ffffff66;
      }
      /* roof block on town hall */
      .townhall .roof {
        position: absolute; width: 70px; height: 70px;
        left: 13px; top: 13px; transform: translateZ(96px);
        transform-style: preserve-3d;
      }
      .townhall .roof .rtop {
        position: absolute; width: 70px; height: 70px; transform: translateZ(34px);
        background: linear-gradient(135deg, var(--roof-red), var(--roof-red-d));
        border: 2px solid #00000033; border-radius: 4px;
        box-shadow: 0 0 18px #ff5a3a55;
      }
      .townhall .roof .rn { width: 70px; height: 34px; transform-origin: top; transform: rotateX(-90deg); background: var(--roof-red-d); }
      .townhall .roof .re { width: 70px; height: 34px; transform-origin: top left; transform: translateX(70px) rotateZ(90deg) rotateX(-90deg); background: #6e1f15; }

      .goldmine { --w: 84px; --d: 84px; --h: 60px; left: 286px; top: 150px; }
      .goldmine .face { background: var(--stone-dark); }
      .goldmine .top {
        background: radial-gradient(circle at 50% 40%, #3a3f44, #23262a);
        box-shadow: inset 0 0 14px #000;
      }
      /* mine entrance arch hint */
      .goldmine .north { background: linear-gradient(#4a4f55, #2a2e33); }

      .watchtower { --w: 60px; --d: 60px; --h: 150px; left: 70px; top: 70px; }
      .watchtower .face { background: var(--stone-2); }
      .watchtower .top {
        background: linear-gradient(135deg, #ffd76a, #e6a812);
        box-shadow: 0 0 26px #ffcf5a99; border-radius: 6px;
      }

      .barracks { --w: 150px; --d: 92px; --h: 26px; left: 60px; top: 250px; }
      .barracks .face { background: var(--wood-1); }
      .barracks .top {
        background:
          repeating-linear-gradient(90deg, #00000018 0 2px, transparent 2px 24px),
          linear-gradient(135deg, var(--wood-1), var(--wood-2));
      }

      /* ---- floating gold coin over the mine ---- */
      .coin-wrap {
        position: absolute; left: 286px; top: 150px;
        transform: translate(28px, 28px) translateZ(60px);
        transform-style: preserve-3d;
        pointer-events: none;
      }
      .coin {
        width: 30px; height: 30px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #fff3b0, var(--gold-1) 45%, var(--gold-2));
        border: 3px solid #b9810c;
        box-shadow: 0 0 18px #ffcf5a;
        /* billboard: undo the stage rotation so coin faces viewer */
        transform: rotateZ(45deg) rotateX(-60deg);
        animation: coinbob 2.2s ease-in-out infinite;
        display: grid; place-items: center;
        font-family: 'JetBrains Mono', monospace; font-weight: 800; color: #7c4a1c;
      }
      @keyframes coinbob {
        0%, 100% { transform: rotateZ(45deg) rotateX(-60deg) translateY(0) scale(1); }
        50% { transform: rotateZ(45deg) rotateX(-60deg) translateY(-14px) scale(1.06); }
      }

      /* ---- billboarded labels / holo projections ---- */
      .billboard {
        position: absolute;
        transform-style: preserve-3d;
        pointer-events: none;
      }
      .billboard .panel {
        /* undo stage rotation -> face the camera, readable */
        transform: rotateZ(45deg) rotateX(-60deg) translate(-50%, -100%);
        transform-origin: center;
        font-family: 'Fredoka', sans-serif;
        white-space: nowrap;
      }

      /* Town Hall holo (hidden until hover) */
      .holo {
        left: 210px; top: 150px; transform: translateZ(196px);
        opacity: 0; transition: opacity 0.2s ease;
      }
      .townhall:hover ~ .holo { opacity: 1; }
      .holo .panel {
        color: var(--holo);
        text-shadow: 0 0 10px var(--holo), 0 0 22px #2ea8ff;
        text-align: center; line-height: 1.25;
      }
      .holo .lvl { font-size: 22px; font-weight: 700; }
      .holo .xp { font-size: 12px; letter-spacing: 2px; color: #bdecff; }
      .holo .bar {
        margin-top: 6px; width: 120px; height: 8px; border-radius: 6px;
        background: #0c2030; border: 1px solid #2ea8ff66; overflow: hidden;
      }
      .holo .bar > i { display: block; height: 100%; width: 72%; background: linear-gradient(90deg, #2ea8ff, #66e6ff); }

      /* static metric tags that always float over buildings */
      .tag .panel {
        background: #0b1422e6;
        border: 1px solid #ffffff22;
        border-radius: 10px;
        padding: 6px 10px;
        box-shadow: 0 6px 18px #000a;
        text-align: center;
      }
      .tag .k { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #9fb4d8; }
      .tag .v { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 16px; color: var(--gold-1); }
      .tag .v.green { color: #8ef06a; }
      .tag .v.cyan { color: var(--holo); }

      .tag-mine { left: 328px; top: 192px; transform: translateZ(118px); }
      .tag-tower { left: 100px; top: 100px; transform: translateZ(208px); }

      /* ---- barracks flags + click dropdown ---- */
      .flag {
        position: absolute; width: 4px; height: 30px;
        transform-style: preserve-3d; cursor: pointer; pointer-events: auto;
      }
      .flag::before {
        content: ''; position: absolute; left: 4px; top: 0; width: 22px; height: 14px;
        transform: rotateZ(45deg) rotateX(-60deg);
        transform-origin: left center;
        box-shadow: 0 2px 4px #0008;
      }
      .flag.todo::before { background: #e74c3c; }
      .flag.doing::before { background: var(--gold-1); }
      .flag.done::before { background: #2ecc71; }
      .flag { background: #5b3a1a; }
      .flag:hover { filter: brightness(1.3); }

      .f1 { left: 78px; top: 268px; transform: translateZ(80px); }
      .f2 { left: 120px; top: 280px; transform: translateZ(80px); }
      .f3 { left: 168px; top: 268px; transform: translateZ(80px); }

      /* dropdown card (screen-space, not in 3D) */
      .dropdown {
        position: absolute; z-index: 20; min-width: 200px;
        background: #0c1626f2; border: 1px solid #ffffff22; border-radius: 12px;
        box-shadow: 0 16px 40px #000b; padding: 10px; display: none;
        font-family: 'Nunito', sans-serif;
      }
      .dropdown.show { display: block; animation: pop 0.16s ease; }
      @keyframes pop { from { transform: translateY(6px) scale(0.96); opacity: 0; } }
      .dropdown h4 { margin: 2px 4px 8px; font-family: 'Fredoka'; font-size: 14px; }
      .dropdown button {
        display: block; width: 100%; text-align: left; border: 0;
        background: #ffffff0d; color: var(--ink); padding: 8px 10px; border-radius: 8px;
        margin: 4px 0; cursor: pointer; font: inherit; font-size: 13px;
      }
      .dropdown button:hover { background: #ffffff1c; }

      .legend {
        position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 16px; font-size: 11px; color: #9fb4d8; z-index: 5;
      }
      .legend span { display: inline-flex; align-items: center; gap: 6px; }
      .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    </style>
  </head>
  <body>
    <div class="title">
      <h1>⚔ Affiliate Realm</h1>
      <p>Town Dashboard</p>
    </div>

    <div class="widget">
      <div class="stage">
        <div class="island">
          <div class="face top"></div>
          <div class="face north"></div>
          <div class="face south"></div>
          <div class="face west"></div>
          <div class="face east"></div>

          <!-- Town Hall (core profile) -->
          <div class="b townhall" title="Town Hall — your profile">
            <div class="face top"></div>
            <div class="face north"></div>
            <div class="face south"></div>
            <div class="face west"></div>
            <div class="face east"></div>
            <div class="roof">
              <div class="rtop"></div>
              <div class="rn"></div>
              <div class="re"></div>
            </div>
          </div>

          <!-- Town Hall holographic projection (hover) -->
          <div class="billboard holo">
            <div class="panel">
              <div class="lvl">Lv. 14 Affiliate</div>
              <div class="xp">8,420 / 12,000 XP</div>
              <div class="bar"><i></i></div>
            </div>
          </div>

          <!-- Gold Mine (revenue) -->
          <div class="b goldmine" title="Gold Mine — revenue">
            <div class="face top"></div>
            <div class="face north"></div>
            <div class="face south"></div>
            <div class="face west"></div>
            <div class="face east"></div>
          </div>
          <div class="coin-wrap"><div class="coin">฿</div></div>
          <div class="billboard tag tag-mine">
            <div class="panel">
              <div class="k">GMV · 5-day streak</div>
              <div class="v">฿134,126</div>
            </div>
          </div>

          <!-- Watchtower (activity) -->
          <div class="b watchtower" title="Watchtower — activity">
            <div class="face top"></div>
            <div class="face north"></div>
            <div class="face south"></div>
            <div class="face west"></div>
            <div class="face east"></div>
          </div>
          <div class="billboard tag tag-tower">
            <div class="panel">
              <div class="k">Activity today</div>
              <div class="v cyan">12 runs</div>
            </div>
          </div>

          <!-- Barracks (tasks) -->
          <div class="b barracks" title="Barracks — tasks"></div>
          <div class="b barracks" style="visibility:hidden"></div>
          <div class="flag todo f1" data-task="Wire live scraper"></div>
          <div class="flag doing f2" data-task="Tune prompt-cron"></div>
          <div class="flag done f3" data-task="Ship dashboard"></div>
        </div>
      </div>
    </div>

    <div class="legend">
      <span><i style="background:#c0392b"></i>Town Hall · Profile</span>
      <span><i style="background:#e6a812"></i>Gold Mine · Revenue</span>
      <span><i style="background:#9aa4ad"></i>Watchtower · Activity</span>
      <span><i style="background:#b9762f"></i>Barracks · Tasks</span>
    </div>

    <!-- task dropdown -->
    <div class="dropdown" id="dd">
      <h4 id="dd-title">Task</h4>
      <button data-a="open">Open task</button>
      <button data-a="done">Mark complete</button>
      <button data-a="snooze">Snooze 1 day</button>
    </div>

    <script>
      // Barracks flag -> dropdown
      const dd = document.getElementById('dd');
      const ddTitle = document.getElementById('dd-title');
      document.querySelectorAll('.flag').forEach((flag) => {
        flag.addEventListener('click', (e) => {
          e.stopPropagation();
          ddTitle.textContent = flag.dataset.task;
          const r = flag.getBoundingClientRect();
          dd.style.left = Math.min(r.left, window.innerWidth - 220) + 'px';
          dd.style.top = r.bottom + 8 + 'px';
          dd.classList.add('show');
        });
      });
      document.addEventListener('click', () => dd.classList.remove('show'));
      dd.addEventListener('click', (e) => e.stopPropagation());

      // Watchtower lighting shifts with "recent activity"
      const tower = document.querySelector('.watchtower .top');
      const palette = ['#ffd76a', '#7ef06a', '#66e6ff', '#ff8a5a'];
      let i = 0;
      setInterval(() => {
        i = (i + 1) % palette.length;
        const c = palette[i];
        tower.style.background = `linear-gradient(135deg, ${c}, #e6a812)`;
        tower.style.boxShadow = `0 0 28px ${c}cc`;
      }, 1600);
    </script>
  </body>
</html>
