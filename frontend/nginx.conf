server {
    listen 80;
    server_name _;

    # API: strip the /api prefix and forward to the backend service.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: serve static assets, fall back to index.html for client routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
